<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
	xmlns:svg="http://www.w3.org/2000/svg"
	xmlns="http://www.w3.org/2000/svg"
	xmlns:xlink="http://www.w3.org/1999/xlink"
	xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
	width="215mm" height="215mm" viewBox="0 0 215 215"
	version="1.1">
	<link xmlns="http://www.w3.org/1999/xhtml" rel="stylesheet" type="text/css" href="sr_sbc.css" />
	<style>
		svg {
		font-family: Arial,sans-serif;
		font-size:15pt;
		font-style: normal;
		font-weight: normal;
		font-stretch:normal;
		text-align: center;
		text-anchor: middle;
		stroke-linejoin: round;
		stroke-dasharray: none;
		stroke-miterlimit: 4;
		line-height:1.25;
		fill-opacity: 1;
		}
		.eqto_box{
		fill:#555;
		stroke:#b3b3b3;
		stroke-width:5;
		stroke-miterlimit:4;
		stroke-dasharray:none;
		paint-order:markers stroke fill;
		}
		.eqto_border{fill:#fff;}
		.eqto_board {fill: #f00;}
		.eqto_draw{fill:#fff;}
		.eqto_label{fill:#fff;font-weight:bold;}

		.ifSIP {fill: #080;}
		.ifRTP {fill: #a80;}
		.ipSR {fill: #00f;}
		.ipVRF {fill: #0f0;}
		.ipMany {fill: #f00;}
	</style>
	<defs>
		<path id="eqto_arrow_l" class="eqto_draw" d="m 0,0 l15,-12.2 0,24 z" />
		<use id="eqto_arrow_r" xlink:href="#eqto_arrow_l" transform="scale(-1, 1)" />
		<use id="eqto_arrow_t" xlink:href="#eqto_arrow_l" transform="rotate(90)" />
		<circle id="eqto_ball" class="eqto_draw" cx="0" cy="0" r="8" />
	</defs>
	<g id="sr">
		<rect class="eqto_box" width="170" height="150" x="66.816307" y="-75" ry="20" transform="rotate(45)" />
		<rect class="eqto_border" width="150" height="150" x="66.816307" y="-75" ry="20" transform="rotate(45)" />
		<rect class="eqto_board" width="140" height="140" x="71.816292" y="-70" ry="20" transform="rotate(45)" />

		<g id="sr_arrow">
			<use xlink:href="#eqto_ball" x="80" y="40" />

			<use xlink:href="#eqto_arrow_t" x="80" y="50" />
			<rect class="eqto_draw" width="15" height="20" x="73" y="60"  />
			<rect class="eqto_draw" width="80" height="15" x="73" y="74"  />
			<rect class="eqto_draw" width="15" height="20" x="138" y="88"  />
		</g>
		<use xlink:href="#sr_arrow" x="0" y="0" transform="rotate(180,100,100)" />
	</g>
	<text class="eqto_label" x="0" y="234" transform="rotate(-45)">SR</text>
</svg>